<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Fichar Bot – Configuración</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 600px;
        margin: 0 auto;
        padding: 24px;
        color: #1a1a1a;
        background: #fafafa;
      }
      h1 {
        font-size: 22px;
        margin-bottom: 24px;
      }
      h2 {
        font-size: 16px;
        margin: 20px 0 12px;
        padding-top: 16px;
        border-top: 1px solid #e5e7eb;
        color: #374151;
      }
      h2:first-of-type {
        border-top: none;
        padding-top: 0;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 600;
        font-size: 13px;
        color: #4b5563;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 12px;
        font-family: "Cascadia Code", monospace;
      }
      input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-save {
        background: #2563eb;
        color: white;
      }
      .btn-save:hover {
        background: #1d4ed8;
      }
      .success {
        color: #059669;
        font-weight: 600;
        margin-left: 12px;
        display: none;
      }
      .footer {
        margin-top: 24px;
        display: flex;
        align-items: center;
      }
      .hint {
        font-size: 12px;
        color: #9ca3af;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <h1>⚙️ Fichar Bot – Configuración</h1>

    <h2>🔑 Login</h2>
    <label for="loginUrl">URL de login</label>
    <input id="loginUrl" placeholder="https://presence.addingplus.net/default.aspx" />

    <div class="row">
      <div>
        <label for="user">Usuario</label>
        <input id="user" type="text" />
      </div>
      <div>
        <label for="pass">Contraseña</label>
        <input id="pass" type="password" />
      </div>
    </div>

    <h2>🎯 Selectores CSS</h2>
    <p class="hint">Los selectores CSS de los botones de la página de fichaje</p>

    <div class="row">
      <div>
        <label for="userSelector">Input usuario</label>
        <input id="userSelector" placeholder="input[name='username']" />
      </div>
      <div>
        <label for="passSelector">Input contraseña</label>
        <input id="passSelector" placeholder="input[name='pwd']" />
      </div>
    </div>

    <label for="submitSelector">Botón login</label>
    <input id="submitSelector" placeholder="button[id='btnEntrar']" />

    <div class="row">
      <div>
        <label for="clockInSelector">Entrada</label>
        <input id="clockInSelector" />
      </div>
      <div>
        <label for="clockInConfirmSelector">Confirmar entrada</label>
        <input id="clockInConfirmSelector" />
      </div>
    </div>

    <div class="row">
      <div>
        <label for="pauseSelector">Pausa</label>
        <input id="pauseSelector" />
      </div>
      <div>
        <label for="pauseConfirmSelector">Confirmar pausa</label>
        <input id="pauseConfirmSelector" />
      </div>
    </div>

    <div class="row">
      <div>
        <label for="resumeSelector">Reanudar</label>
        <input id="resumeSelector" />
      </div>
      <div>
        <label for="resumeConfirmSelector">Confirmar reanudar</label>
        <input id="resumeConfirmSelector" />
      </div>
    </div>

    <div class="row">
      <div>
        <label for="clockOutSelector">Salida</label>
        <input id="clockOutSelector" />
      </div>
      <div>
        <label for="clockOutConfirmSelector">Confirmar salida</label>
        <input id="clockOutConfirmSelector" />
      </div>
    </div>

    <label for="reopenSelector">Reabrir</label>
    <input id="reopenSelector" />

    <h2>⏱️ Tiempos</h2>
    <label for="postActionWait">Espera post-acción (ms)</label>
    <input id="postActionWait" type="number" value="3000" />

    <div class="footer">
      <button class="btn btn-save" id="btnSave">💾 Guardar</button>
      <span class="success" id="saved">✅ Guardado</span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
