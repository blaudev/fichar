<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-width: 1000px;
        min-height: 600px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        color: #1a1a1a;
        background: #fafafa;
      }
      .header {
        background: #2563eb;
        color: white;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .header h1 {
        font-size: 15px;
        font-weight: 600;
      }
      .status-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
      }
      .status-started {
        background: #fef3c7;
        color: #92400e;
      }
      .status-clocked-in {
        background: #d1fae5;
        color: #065f46;
      }
      .status-paused {
        background: #fde68a;
        color: #92400e;
      }
      .status-resumed {
        background: #bfdbfe;
        color: #1e40af;
      }
      .status-clocked-out {
        background: #e5e7eb;
        color: #374151;
      }
      .status-no-config {
        background: #fee2e2;
        color: #991b1b;
      }
      .status-day-off {
        background: #f3e8ff;
        color: #6b21a8;
      }
      section {
        padding: 12px 16px;
        border-bottom: 1px solid #e5e7eb;
      }
      .schedule-grid {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 4px 12px;
        margin-top: 8px;
      }
      .schedule-grid .label {
        color: #6b7280;
      }
      .schedule-grid .time {
        font-weight: 600;
        font-family: "Cascadia Code", monospace;
      }
      .schedule-grid .time.active {
        color: #2563eb;
      }
      .next-action {
        background: #eff6ff;
        border-radius: 8px;
        padding: 10px 12px;
        margin-top: 8px;
      }
      .next-action .emoji {
        font-size: 18px;
      }
      .next-action .info {
        font-weight: 600;
        color: #1e40af;
      }
      .hours {
        display: flex;
        gap: 16px;
        margin-top: 8px;
      }
      .hours .stat {
        text-align: center;
        flex: 1;
      }
      .hours .stat .value {
        font-size: 18px;
        font-weight: 700;
        color: #2563eb;
      }
      .hours .stat .label {
        font-size: 11px;
        color: #6b7280;
      }
      .logs {
        max-height: 150px;
        overflow-y: auto;
        font-family: "Cascadia Code", monospace;
        font-size: 11px;
        color: #4b5563;
        background: #f9fafb;
        border-radius: 6px;
        padding: 8px;
        margin-top: 8px;
      }
      .logs .line {
        padding: 1px 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .actions {
        display: flex;
        gap: 8px;
        padding: 12px 16px;
      }
      .btn {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .btn:hover {
        opacity: 0.85;
      }
      .btn-primary {
        background: #2563eb;
        color: white;
      }
      .btn-secondary {
        background: #e5e7eb;
        color: #374151;
      }
      .btn-google {
        background: #ea4335;
        color: white;
      }
      h2 {
        font-size: 13px;
        font-weight: 600;
        color: #374151;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span style="font-size: 20px">⏰</span>
      <h1>Fichar Bot</h1>
      <span id="statusBadge" class="status-badge" style="margin-left: auto">...</span>
    </div>

    <section id="scheduleSection">
      <h2>📅 Horario de hoy</h2>
      <div class="schedule-grid" id="scheduleGrid">
        <span class="label">Entrada</span><span class="time" id="tClockIn">--:--</span> <span class="label">Pausa</span
        ><span class="time" id="tPause">--:--</span> <span class="label">Retomar</span
        ><span class="time" id="tResume">--:--</span> <span class="label">Salida</span
        ><span class="time" id="tClockOut">--:--</span>
      </div>
      <div class="next-action" id="nextAction" style="display: none">
        <span class="emoji" id="nextEmoji"></span>
        <span class="info" id="nextInfo"></span>
      </div>
    </section>

    <section>
      <h2>📊 Horas</h2>
      <div class="hours">
        <div class="stat">
          <div class="value" id="todayHours">--</div>
          <div class="label">Hoy</div>
        </div>
        <div class="stat">
          <div class="value" id="weekHours">--</div>
          <div class="label">Semana</div>
        </div>
      </div>
    </section>

    <section>
      <h2>📋 Log reciente</h2>
      <div class="logs" id="logsContainer"></div>
    </section>

    <div class="actions">
      <button class="btn btn-primary" id="btnRun">▶ Iniciar hoy</button>
      <button class="btn btn-google" id="btnGoogle">🔑 Google</button>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="btnGenerate" style="background: #7c3aed">📅 Generar calendario</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
