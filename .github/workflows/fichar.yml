name: Fichar

on:
  # Cron en UTC. El script decide según la hora real de Madrid (maneja el horario
  # de verano), por eso cada franja cubre las dos posibles horas UTC (invierno +1,
  # verano +2). Solo se ejecuta alrededor de los 3 momentos de fichaje, cada 15 min.
  schedule:
    - cron: "*/15 6-7 * * 1-5" # entrada (~08:00-08:15 Madrid)
    - cron: "*/15 11-13 * * 1-5" # pausa y reanudación (~13:00-14:00 Madrid)
    - cron: "*/5 14-17 * * 1-5" # salida: cada 5 min para ceñir el corte a <8h
  workflow_dispatch: {}

# Evita que dos ejecuciones solapadas fichen a la vez
concurrency:
  group: fichar
  cancel-in-progress: false

jobs:
  fichar:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        working-directory: bot
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Fichar
        working-directory: bot
        env:
          PORTAL_USER: ${{ secrets.PORTAL_USER }}
          PORTAL_PASS: ${{ secrets.PORTAL_PASS }}
        run: node fichar.mjs
